<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mumtaz Edukids</title>
    <style>
        :root {
            --warna-pink: #FF6B6B;
            --warna-biru: #4D96FF;
            --warna-hijau: #6BCB77;
            --warna-kuning: #FFD93D;
            --warna-ungu: #9B5DE5;
            --warna-latar: #FFF5E4;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            background-color: #222;
            color: #333;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #app-container {
            width: 100%;
            max-width: 480px;
            height: 100vh;
            background: white;
            position: relative;
            box-shadow: 0 0 30px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .skrin {
            display: none;
            flex-direction: column;
            width: 100%;
            height: 100%;
            padding: 24px;
            position: absolute;
            top: 0;
            left: 0;
            background-image: radial-gradient(rgba(255,255,255,0.15) 20%, transparent 20%),
                              radial-gradient(rgba(255,255,255,0.15) 20%, transparent 20%);
            background-size: 30px 30px;
            background-position: 0 0, 15px 15px;
            transition: background-color 0.5s ease;
        }

        .skrin.aktif {
            display: flex;
        }

        #halaman-utama {
            justify-content: center;
            align-items: center;
            text-align: center;
            background-color: #FFDEB4;
        }

        .logo-box h1 {
            font-size: 2.8rem;
            color: var(--warna-pink);
            text-shadow: 3px 3px 0px #fff, 5px 5px 0px rgba(0,0,0,0.1);
            margin-bottom: 5px;
            animation: bounce 2s infinite;
        }

        .logo-box p {
            font-size: 1.3rem;
            color: #555;
            font-weight: bold;
            margin-bottom: 40px;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
            width: 100%;
            max-width: 360px;
        }

        .btn-menu {
            border: none;
            border-bottom: 8px solid rgba(0,0,0,0.15);
            border-radius: 24px;
            padding: 22px 10px;
            font-size: 1.3rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: transform 0.1s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .btn-menu:active {
            transform: translateY(6px);
            border-bottom-width: 2px;
        }

        .btn-menu span {
            font-size: 2.5rem;
            filter: drop-shadow(2px 2px 0px rgba(0,0,0,0.1));
        }

        .btn-huruf { background-color: var(--warna-pink); }
        .btn-nombor { background-color: var(--warna-biru); }
        .btn-bentuk { background-color: var(--warna-hijau); }
        .btn-warna { background-color: var(--warna-kuning); color: #333; }
        .btn-main { background-color: var(--warna-ungu); grid-column: span 2; }

        .btn-ibu-bapa {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.8);
            border: 3px solid #ddd;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .header-modul {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
            z-index: 10;
        }

        .btn-kembali, .btn-audio-ulang {
            background: rgba(255,255,255,0.9);
            border: 4px solid #ddd;
            border-radius: 50%;
            width: 55px;
            height: 55px;
            font-size: 1.6rem;
            cursor: pointer;
            box-shadow: 0 6px 0px #ccc;
            transition: all 0.1s;
        }
        
        .btn-kembali:active, .btn-audio-ulang:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0px #ccc;
        }

        .btn-audio-ulang {
            border-color: var(--warna-kuning);
            box-shadow: 0 6px 0px #E6B800;
        }
        .btn-audio-ulang:active {
            box-shadow: 0 2px 0px #E6B800;
        }

        .kandungan-kad {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            cursor: pointer;
            width: 100%;
        }

        .visual-besar {
            font-size: 9rem;
            margin: 10px 0;
            filter: drop-shadow(4px 8px 10px rgba(0,0,0,0.15));
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .perkataan-mudah {
            font-size: 2.6rem;
            font-weight: 900;
            color: #333;
            background: rgba(255,255,255,0.8);
            padding: 5px 25px;
            border-radius: 20px;
            border: 3px solid rgba(0,0,0,0.05);
            text-transform: uppercase;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .pujian-box {
            height: 60px;
            font-size: 2.2rem;
            font-weight: bold;
            color: #2e7d32;
            text-shadow: 2px 2px 0px #fff;
            text-align: center;
            visibility: hidden;
        }

        .navigasi-bawah {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 80px;
            width: 100%;
        }

        .btn-nav {
            background: white;
            border: 4px solid #ddd;
            border-bottom: 8px solid #ccc;
            border-radius: 20px;
            padding: 10px 35px;
            font-size: 2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.1s;
        }

        .btn-nav:active {
            transform: translateY(4px);
            border-bottom-width: 4px;
        }

        .soalan-box {
            font-size: 1.8rem;
            font-weight: bold;
            text-align: center;
            margin: 20px 0;
            background: white;
            padding: 10px;
            border-radius: 15px;
            border: 3px dashed var(--warna-ungu);
        }

        .pilihan-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            flex: 1;
            width: 100%;
        }

        .kad-pilihan {
            background: white;
            border: 5px solid #ddd;
            border-bottom: 10px solid #ccc;
            border-radius: 28px;
            width: 150px;
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 5.5rem;
            cursor: pointer;
            filter: drop-shadow(0 8px 15px rgba(0,0,0,0.05));
            transition: all 0.2s;
        }

        .kad-pilihan:active {
            transform: translateY(4px);
            border-bottom-width: 5px;
        }

        .parent-content {
            overflow-y: auto;
            flex: 1;
            margin-top: 15px;
        }

        .parent-card {
            background: #f9f9f9;
            border-left: 6px solid var(--warna-ungu);
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 0 15px 15px 0;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .lompat { transform: scale(1.25) rotate(4deg); }
        .goyang { animation: shake 0.4s ease-in-out; }

        @keyframes shake {
            0%, 100% { transform: translateX(0) rotate(0); }
            25% { transform: translateX(-12px) rotate(-3deg); }
            75% { transform: translateX(12px) rotate(3deg); }
        }
    </style>
</head>
<body>

<div id="app-container">

    <!-- HALAMAN UTAMA -->
    <div id="halaman-utama" class="skrin aktif">
        <button class="btn-ibu-bapa" onclick="bukaIbuBapa()">⚙️</button>
        <div class="logo-box">
            <h1>Mumtaz Edukids</h1>
            <p>"Belajar, Kenal dan Ceria!"</p>
        </div>
        <div class="menu-grid">
            <button class="btn-menu btn-huruf" onclick="bukaModul('huruf')"><span>🔤</span>HURUF</button>
            <button class="btn-menu btn-nombor" onclick="bukaModul('nombor')"><span>🔢</span>NOMBOR</button>
            <button class="btn-menu btn-bentuk" onclick="bukaModul('bentuk')"><span>🔷</span>BENTUK</button>
            <button class="btn-menu btn-warna" onclick="bukaModul('warna')"><span>🎨</span>WARNA</button>
            <button class="btn-menu btn-main" onclick="bukaModul('main')"><span>🎮</span>MAIN</button>
        </div>
    </div>

    <!-- SKRIN MODUL PEMBELAJARAN -->
    <div id="skrin-belajar" class="skrin">
        <div class="header-modul">
            <button class="btn-kembali" onclick="kembaliUtama()">🏠</button>
            <button class="btn-audio-ulang" onclick="ulangAudio()">🔊</button>
        </div>
        <div class="kandungan-kad" onclick="sentuhKad()">
            <div id="visual-besar" class="visual-besar">🐔</div>
            <div id="txt-mudah" class="perkataan-mudah">AYAM</div>
        </div>
        <div id="pujian-belajar" class="pujian-box">Wahhh, pandainya!</div>
        <div class="navigasi-bawah">
            <button class="btn-nav" onclick="navKad(-1)">←</button>
            <button class="btn-nav" onclick="navKad(1)">→</button>
        </div>
    </div>

    <!-- SKRIN PERMAINAN -->
    <div id="skrin-permainan" class="skrin">
        <div class="header-modul">
            <button class="btn-kembali" onclick="kembaliUtama()">🏠</button>
            <div id="pujian-main" class="pujian-box">Hebatlah sayang!</div>
        </div>
        <div id="soalan-teks" class="soalan-box">Mana bola?</div>
        <div class="pilihan-container">
            <div id="pilihan-1" class="kad-pilihan" onclick="semakJawapan(0)">⚽</div>
            <div id="pilihan-2" class="kad-pilihan" onclick="semakJawapan(1)">🍎</div>
        </div>
    </div>

    <!-- SKRIN IBU BAPA -->
    <div id="skrin-ibu-bapa" class="skrin">
        <div class="header-modul">
            <button class="btn-kembali" onclick="kembaliUtama()">🏠</button>
            <h3>Modul Ibu Bapa</h3>
        </div>
        <div class="parent-content">
            <div class="parent-card">
                <h4>⏱️ Tempoh Penggunaan</h4>
                <p id="parent-masa">Mengira...</p>
            </div>
            <div class="parent-card">
                <h4>🔤 Kad Huruf Dilihat</h4>
                <p id="parent-huruf">0 daripada 26</p>
            </div>
            <div class="parent-card">
                <h4>🔢 Nombor Dipelajari</h4>
                <p id="parent-nombor">0 daripada 10</p>
            </div>
            <div class="parent-card">
                <h4>🔷 Bentuk Dilihat</h4>
                <p id="parent-bentuk">0 daripada 6</p>
            </div>
            <div class="parent-card">
                <h4>🎨 Warna Dilihat</h4>
                <p id="parent-warna">0 daripada 9</p>
            </div>
        </div>
    </div>

</div>

    const firebaseConfig = {
        apiKey: "AIzaSyCo_88Uwl-E7-C0Z0por2Agv-plToDlEgk",
        authDomain: "projek-mumtaz.firebaseapp.com",
        databaseURL: "https://projek-mumtaz-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "projek-mumtaz",
        storageBucket: "projek-mumtaz.firebasestorage.app",
        messagingSenderId: "448069580212",
        appId: "1:448069580212:web:c6faf46d39ed1ee61e6ee1"

    let masaMula = Date.now();

    window.rekodKemajuanFirebase = function(kategori) {

    }
</script>

<script>
    const dataHuruf = [
        {v:"🐔", p:"Ayam", bg:"#FFECEF"}, {v:"⚽", p:"Bola", bg:"#EAF2FF"}, {v:"🌶️", p:"Cili", bg:"#E8FFF5"},
        {v:"🪙", p:"Duit", bg:"#FFFDE6"}, {v:"🍎", p:"Epal", bg:"#FFE6E6"}, {v:"📸", p:"Foto", bg:"#F3E8FF"},
        {v:"🐘", p:"Gajah", bg:"#FFECEF"}, {v:"💖", p:"Hati", bg:"#FFE6F2"}, {v:"🐟", p:"Ikan", bg:"#EAF2FF"},
        {v:"⏰", p:"Jam", bg:"#FFFDE6"}, {v:"🐱", p:"Kucing", bg:"#FDF5E6"}, {v:"🚛", p:"Lori", bg:"#EAF2FF"},
        {v:"👁️", p:"Mata", bg:"#FFECEF"}, {v:"🍚", p:"Nasi", bg:"#FFFDE6"}, {v:"🍊", p:"Oren", bg:"#FFF3E0"},
        {v:"🍌", p:"Pisang", bg:"#FFFDE6"}, {v:"📖", p:"Quran", bg:"#E8FFF5"}, {v:"🏠", p:"Rumah", bg:"#F3E8FF"},
        {v:"🥛", p:"Susu", bg:"#F7F9FC"}, {v:"👒", p:"Topi", bg:"#FFE6F2"}, {v:"🦐", p:"Udang", bg:"#FFE6E6"},
        {v:"🚐", p:"Van", bg:"#EAF2FF"}, {v:"💵", p:"Wang", bg:"#E8FFF5"}, {v:"🪘", p:"Xilofon", bg:"#FFFDE6"},
        {v:"🪀", p:"Yoyo", bg:"#F3E8FF"}, {v:"🦓", p:"Zebra", bg:"#F7F9FC"}
    ];

    const dataNombor = [
        {v:"⚽", p:"Satu Bola", bg:"#EAF2FF"}, {v:"⚽⚽", p:"Dua Bola", bg:"#EAF2FF"}, {v:"🍎🍎🍎", p:"Tiga Epal", bg:"#FFE6E6"},
        {v:"🍌🍌🍌🍌", p:"Empat Pisang", bg:"#FFFDE6"}, {v:"⭐⭐⭐⭐⭐", p:"Lima Bintang", bg:"#FFFDE6"}, 
        {v:"🚗🚗🚗🚗🚗🚗", p:"Enam Kereta", bg:"#FFECEF"}, {v:"🐥🐥🐥🐥🐥🐥🐥", p:"Tujuh Anak Ayam", bg:"#FFFDE6"},
        {v:"🐟🐟🐟🐟🐟🐟🐟🐟", p:"Lapan Ikan", bg:"#EAF2FF"}, {v:"🎈🎈🎈🎈🎈🎈🎈🎈🎈", p:"Sembilan Belon", bg:"#F3E8FF"},
        {v:"⚽⚽⚽⚽⚽⚽⚽⚽⚽⚽", p:"Sepuluh Bola", bg:"#EAF2FF"}
    ];

    const dataBentuk = [
        {v:"⭕", p:"Bulat", bg:"#FFFDE6"}, {v:"🟩", p:"Segi Empat", bg:"#E8FFF5"}, {v:"🔺", p:"Segi Tiga", bg:"#FFE6E6"},
        {v:"⭐", p:"Bintang", bg:"#FFFDE6"}, {v:"💖", p:"Hati", bg:"#FFE6F2"}, {v:"🥚", p:"Oval", bg:"#F7F9FC"}
    ];

    const dataWarna = [
        {v:"🔴", p:"Merah", bg:"#FFE6E6"}, {v:"🔵", p:"Biru", bg:"#EAF2FF"}, {v:"🟡", p:"Kuning", bg:"#FFFDE6"},
        {v:"🟢", p:"Hijau", bg:"#E8FFF5"}, {v:"🟠", p:"Oren", bg:"#FFF3E0"}, {v:"🟣", p:"Ungu", bg:"#F3E8FF"},
        {v:"🌸", p:"Merah Jambu", bg:"#FFE6F2"}, {v:"⚫", p:"Hitam", bg:"#Eaeaea"}, {v:"⚪", p:"Putih", bg:"#F7F9FC"}
    ];

    // Pujian gaya emak-emak yang sangat manja dan gembira
    const pujianSpontanTeks = ["Wahhh, pandainya anak ibu!", "Hebatlah sayang!", "Comelnya dia!", "Bijaknya anak soleh solehah ni!"];
    const pujianSpontanSuara = ["Wahhh pandainya anak ibu", "Hebatlah sayang", "Comelnya dia", "Bijaknya anak ibu ni"];

    let modulSemasa = '';
    let indeksSemasa = 0;
    let dataSemasa = [];
    let dipelajari = { huruf: new Set(), nombor: new Set(), bentuk: new Set(), warna: new Set() };

    // PENUTUR SUARA: NADA TINGGI, CERIA & GAYA BERBUAL DENGAN ANAK
    function sebut(teks) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            let ucapan = new SpeechSynthesisUtterance(teks);
            ucapan.lang = 'ms-MY';
            ucapan.rate = 0.88; // Kelajuan sedikit santai tapi bertenaga
            ucapan.pitch = 1.55; // Nada dinaikkan tinggi untuk meniru suara keibuan (motherese)
            window.speechSynthesis.speak(ucapan);
        }
    }

    function tukarSkrin(idSkrin) {
        document.querySelectorAll('.skrin').forEach(s => s.classList.remove('aktif'));
        document.getElementById(idSkrin).classList.add('aktif');
    }

    function kembaliUtama() {
        tukarSkrin('halaman-utama');
    }

    function bukaModul(jenis) {
        modulSemasa = jenis;
        indeksSemasa = 0;
        
        if (jenis === 'huruf') dataSemasa = dataHuruf;
        else if (jenis === 'nombor') dataSemasa = dataNombor;
        else if (jenis === 'bentuk') dataSemasa = dataBentuk;
        else if (jenis === 'warna') dataSemasa = dataWarna;
        else if (jenis === 'main') { binaPermainan(); return; }

        kemaskiniKad();
        tukarSkrin('skrin-belajar');
    }

    function kemaskiniKad() {
        let item = dataSemasa[indeksSemasa];
        let skrin = document.getElementById('skrin-belajar');
        
        skrin.style.backgroundColor = item.bg;
        dipelajari[modulSemasa].add(indeksSemasa);
        if(window.rekodKemajuanFirebase) window.rekodKemajuanFirebase(modulSemasa);

        document.getElementById('visual-besar').innerText = item.v;
        document.getElementById('txt-mudah').innerText = item.p;
        document.getElementById('pujian-belajar').style.visibility = 'hidden';
        
        ulangAudio();
    }

    function navKad(arah) {
        indeksSemasa += arah;
        if (indeksSemasa < 0) indeksSemasa = dataSemasa.length - 1;
        if (indeksSemasa >= dataSemasa.length) indeksSemasa = 0;
        kemaskiniKad();
    }

    // Gaya percakapan harian (Contoh: "Tengok ni... Ayam!")
    function ulangAudio() {
        if (!dataSemasa[indeksSemasa]) return;
        let item = dataSemasa[indeksSemasa];
        
        if (modulSemasa === 'huruf' || modulSemasa === 'nombor') {
            sebut("Tengok ni... " + item.p);
        } else if (modulSemasa === 'bentuk') {
            sebut("Ini... bentuk " + item.p);
        } else if (modulSemasa === 'warna') {
            sebut("Cuba tengok... warna " + item.p);
        }
    }

    function sentuhKad() {
        let visualBesar = document.getElementById('visual-besar');
        let pujianBox = document.getElementById('pujian-belajar');

        visualBesar.classList.add('lompat');
        
        let rawakIndeks = Math.floor(Math.random() * pujianSpontanTeks.length);
        pujianBox.innerText = pujianSpontanTeks[rawakIndeks];
        pujianBox.style.visibility = 'visible';

        sebut(pujianSpontanSuara[rawakIndeks]);

        setTimeout(() => {
            visualBesar.classList.remove('lompat');
        }, 300);
    }

    // PERMAINAN GAYA IBU MENGAJAK ANAK MAIN
    let jawapanBetulIndeks = 0;
    let dataSoalanSemasa = {};

    function binaPermainan() {
        tukarSkrin('skrin-permainan');
        document.getElementById('pujian-main').style.visibility = 'hidden';
        
        let jenisKuiz = Math.floor(Math.random() * 4);
        let setData = dataHuruf;

        if (jenisKuiz === 1) setData = dataNombor;
        if (jenisKuiz === 2) setData = dataBentuk;
        if (jenisKuiz === 3) setData = dataWarna;

        let item1 = setData[Math.floor(Math.random() * setData.length)];
        let item2 = setData[Math.floor(Math.random() * setData.length)];
        while (item1.p === item2.p) {
            item2 = setData[Math.floor(Math.random() * setData.length)];
        }

        jawapanBetulIndeks = Math.floor(Math.random() * 2);
        dataSoalanSemasa = jawapanBetulIndeks === 0 ? item1 : item2;

        document.getElementById('skrin-permainan').style.backgroundColor = "#E8F5E9";
        
        let namaObjek = dataSoalanSemasa.p;
        
        // Ayat teks & sebutan santai
        document.getElementById('soalan-teks').innerText = "Mana satu " + namaObjek.toLowerCase() + " ek?";
        document.getElementById('pilihan-1').innerText = item1.v;
        document.getElementById('pilihan-2').innerText = item2.v;

        sebut("Sayang... mana satu " + namaObjek + " ek? Cer cari.");
    }

    function semakJawapan(indeksDipilih) {
        let pujianBox = document.getElementById('pujian-main');
        let kadDipilih = document.getElementById(`pilihan-${indeksDipilih + 1}`);

        if (indeksDipilih === jawapanBetulIndeks) {
            let rawakIndeks = Math.floor(Math.random() * pujianSpontanTeks.length);
            pujianBox.innerText = pujianSpontanTeks[rawakIndeks];
            pujianBox.style.visibility = 'visible';
            
            sebut("Yeayyy betul! " + pujianSpontanSuara[rawakIndeks]);
            
            kadDipilih.classList.add('lompat');
            setTimeout(() => {
                kadDipilih.classList.remove('lompat');
                binaPermainan();
            }, 1600);
        } else {
            pujianBox.innerText = "Alahhh... cuba lagi sayang.";
            pujianBox.style.visibility = 'visible';
            sebut("Alahhh... salah lah sayang. Cuba lagi jom.");
            kadDipilih.classList.add('goyang');
            setTimeout(() => kadDipilih.classList.remove('goyang'), 400);
        }
    }

    function bukaIbuBapa() {
        let soalan = Math.floor(Math.random() * 3) + 2;
        let jawapan = prompt(`Bahagian Ibu Bapa: Sila jawab ${soalan} tambah 1 untuk masuk.`);
        
        if (parseInt(jawapan) === (soalan + 1)) {
            document.getElementById('parent-huruf').innerText = `${dipelajari.huruf.size} daripada 26`;
            document.getElementById('parent-nombor').innerText = `${dipelajari.nombor.size} daripada 10`;
            document.getElementById('parent-bentuk').innerText = `${dipelajari.bentuk.size} daripada 6`;
            document.getElementById('parent-warna').innerText = `${dipelajari.warna.size} daripada 9`;
            document.getElementById('skrin-ibu-bapa').style.backgroundColor = "#F3E8FF";
            tukarSkrin('skrin-ibu-bapa');
        }
    }
</script>
